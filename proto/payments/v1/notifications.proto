syntax = "proto3";

package payments.v1;

option go_package = "github.com/lastviking/payments-proto/gen/go/payments/v1;paymentsv1";
option java_multiple_files = true;
option java_package = "eu.lastviking.payments.v1";

import "google/protobuf/timestamp.proto";
import "payments/v1/payments.proto";

//
// EntitlementNotificationsService: implemented by the payment service.
// Product backends connect and receive a best-effort stream of recent
// entitlement changes plus live updates.
//
// Delivery is at-least-once; receivers must be idempotent.
// New streams replay a recent backlog before switching to live updates.
//
service EntitlementNotificationsService {
  // Subscribe to recent and live entitlement changes.
  rpc SubscribeEntitlementChanges(SubscribeEntitlementChangesRequest)
      returns (stream EntitlementChangeEvent);
}

message SubscribeEntitlementChangesRequest {
  // Unique id for this backend instance (UUID recommended).
  // Used for observability and troubleshooting.
  string backend_instance_id = 1;
}

message EntitlementChangeEvent {
  // Unique id for this notification event (UUID recommended).
  // Receiver should de-duplicate on this value (store for a while).
  string event_id = 1;

  // When the payment service emitted this event.
  google.protobuf.Timestamp emitted_at = 2;

  // The new state.
  Entitlement entitlement = 3;

  // Product-defined routing subject.
  // For nextapp, this is the tenant id.
  string subject_id = 4;

  // Optional: why it changed (useful for logs/UX).
  ChangeReason reason = 5;

  // Optional: provider event id for correlation (Stripe event id, Pub/Sub message id).
  string provider_event_id = 6;
}

enum ChangeReason {
  CHANGE_REASON_UNSPECIFIED = 0;

  CHANGE_REASON_SUBSCRIPTION_CREATED = 1;
  CHANGE_REASON_SUBSCRIPTION_UPDATED = 2;
  CHANGE_REASON_SUBSCRIPTION_CANCELED = 3;

  CHANGE_REASON_PAYMENT_SUCCEEDED = 4;
  CHANGE_REASON_PAYMENT_FAILED = 5;

  CHANGE_REASON_RECONCILED = 6;
  CHANGE_REASON_ADMIN_OVERRIDE = 7;
}
